# V1: Blazor Example + Docker Infrastructure
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore src/SqlSpaExplorer.sln

      - name: Build
        run: dotnet build src/SqlSpaExplorer.sln --no-restore -c Release

      - name: Test
        run: dotnet test src/SqlSpaExplorer.sln --no-build -c Release --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
